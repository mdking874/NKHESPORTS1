name: HTML to APK Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install Capacitor and Dependencies
      run: |
        npm init -y
        npm install @capacitor/core @capacitor/cli @capacitor/android
        mkdir -p www
        cp inbox.html www/index.html || echo "inbox.html not found, skipping copy"
        npx cap init "NKHESPORTS" "com.nkh.app" --web-dir www
        npx cap add android

    - name: Clean Gradle Cache
      run: |
        rm -rf ~/.gradle/caches

    - name: Build Android Project
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: NKH-ESPORTS-App
        path: android/app/build/outputs/apk/debug/app-debug.apk
