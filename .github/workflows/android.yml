name: HTML to APK Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install Dependencies
      run: |
        npm install @capacitor/core @capacitor/cli @capacitor/android
        mkdir -p www
        cp inbox.html www/index.html
        npx cap init "NKHESPORTS" "com.nkh.app" --web-dir www
        npx cap add android

    - name: Build Android APK
      run: |
        cd android
        # গ্রেডল ক্যাশ অপটিমাইজ করা এবং মেমরি ইস্যু কমানো
        echo "org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m" >> gradle.properties
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon --max-workers=2
      env:
        # জাভা মেমরি লিমিট সেট করা
        GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2048m"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: NKH-ESPORTS-App
        path: android/app/build/outputs/apk/debug/app-debug.apk
